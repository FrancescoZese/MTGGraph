name: Update Modern Metagame

on:
  schedule:
    # Every day at 04:00 UTC (06:00 Italy)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Fetch and ingest new tournaments
        run: python -u -m scripts.update_meta --auto --top 16
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"

      - name: Validate graph.json
        run: python -c "import json; json.load(open('computed/graph.json')); print('graph.json is valid')"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/ computed/
          git commit -m "auto: update metagame $(date +%Y-%m-%d)"
          git push
